baseURL: "https://kartiksankhla.com/"
locale: "en-us"
title: "Kartik Sankhla"
theme: "PaperMod"
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
pygmentsUseClasses: true

minify:
  disableXML: true
  minifyOutput: true

params:
  env: production
  # goatcounter: "yourcode"   # register a free site at goatcounter.com, then put the subdomain here (e.g. "kartiksankhla") to turn on privacy-friendly analytics
  title: "Kartik Sankhla"
  description: "DFIR & Linux security researcher — digital forensics, memory & filesystem forensics, malware analysis."
  author: "Kartik Sankhla"
  images: ["og-image.png"]    # default social-share image (Open Graph / Twitter) for pages without their own
  defaultTheme: auto          # respects the visitor's light/dark preference
  ShowReadingTime: true
  ShowShareButtons: false
  ShowCodeCopyButtons: true
  ShowBreadCrumbs: true
  ShowPostNavLinks: true
  ShowRssButtonInSectionTermList: true
  disableSpecial1stPost: false

  comments: true              # show giscus comments on single pages (disabled on /about/ via its front matter)
  giscus:
    repo: "kartik0025/kartik0025.github.io"
    repoId: "R_kgDOSrKD5Q"
    category: "Announcements"          # maintainer-only category: visitors can reply, but can't open new threads
    categoryId: "DIC_kwDOSrKD5c4C-id1"
    mapping: "pathname"
    theme: "preferred_color_scheme"    # giscus follows each visitor's light/dark preference
    inputPosition: "top"
    reactionsEnabled: "1"
    strict: "1"
    lang: "en"

  homeInfoParams:
    Title: "Kartik Sankhla"
    Content: >
      DFIR & Linux security researcher. M.Tech Cyber Security at NFSU.
      I work on digital forensics, memory & filesystem forensics, malware analysis,
      and Linux internals. I write here about what I'm investigating and building.

  socialIcons:
    - name: github
      url: "https://github.com/kartik0025"
    - name: linkedin
      url: "https://linkedin.com/in/kartik0025"
    - name: email
      url: "mailto:kartik0025@gmail.com"

  assets:
    disableHLJS: false
    favicon: "/favicon.ico"
    theme_color: "#222b36"     # mobile browser-chrome color, matched to the favicon

menu:
  main:
    - identifier: about
      name: About
      url: /about/
      weight: 10
    - identifier: posts
      name: Blog
      url: /posts/
      weight: 20
    - identifier: search
      name: Search
      url: /search/
      weight: 30

outputs:
  home:
    - HTML
    - RSS
    - JSON          # required so the Search page works
